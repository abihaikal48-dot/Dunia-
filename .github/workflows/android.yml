name: Build & Install Android APK

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK and Upload Release Artifacts
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Grant Execute Permission to Gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon

    - name: Rename & Prepare APK Artifact
      run: |
        mkdir -p build-artifacts
        if [ -f DUNIA-Mitra-App-Debug.apk ]; then
          cp DUNIA-Mitra-App-Debug.apk build-artifacts/DUNIA-Mitra-App-Debug.apk
        elif [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
          cp app/build/outputs/apk/debug/app-debug.apk build-artifacts/DUNIA-Mitra-App-Debug.apk
        else
          echo "ERROR: APK file not found!"
          exit 1
        fi
        echo "APK file successfully prepared in build-artifacts/"

    - name: Upload APK As Action Run Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DUNIA-Mitra-App-Debug-APK
        path: build-artifacts/DUNIA-Mitra-App-Debug.apk
        if-no-files-found: error
        retention-days: 14

    - name: Create Git Release & Upload APK (On Version Tag Push)
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: build-artifacts/DUNIA-Mitra-App-Debug.apk
        name: Release ${{ github.ref_name }}
        tag_name: ${{ github.ref_name }}
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Update Git "latest" Tag on Remote
      if: "!startsWith(github.ref, 'refs/tags/v')"
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git tag -fa latest -m "DUNIA Mitra App Latest Build"
        git push origin :refs/tags/latest || true
        git push origin latest --force

    - name: Update Latest Release (On Every Push to Any Branch)
      if: "!startsWith(github.ref, 'refs/tags/v')"
      uses: softprops/action-gh-release@v2
      with:
        files: build-artifacts/DUNIA-Mitra-App-Debug.apk
        name: "DUNIA Mitra App Latest Build"
        tag_name: "latest"
        body: |
          ### File APK Terbaru Berhasil Di-build! 🎉
          
          Unduhlah berkas APK di bawah ini dan pasang langsung di HP Android kamu.
          
          **Detail Berkas:**
          - **Nama File**: `DUNIA-Mitra-App-Debug.apk`
          - **Build Time**: ${{ github.event.head_commit.timestamp || 'N/A' }}
          - **Commit link**: [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
          
          *Catatan: Pastikan kamu mengizinkan instalasi dari sumber tidak dikenal (Unknown Sources) di pengaturan keamanan HP kamu.*
        draft: false
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
